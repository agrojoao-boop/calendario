<script type="text/babel" data-presets="react">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});


</script>

<script type="text/babel" data-presets="react">
// build-layers.jsx — construção contínua, estilo da arte conceitual
// Fundo escuro verde-noite · faixas climáticas verticais · curvas de sinais ·
// planta no centro com anéis concêntricos · pontos-chave conectados

const PALETTE = ['#1565C0', '#42A5F5', '#43A047', '#FDD835', '#FB8C00', '#E53935'];
const MONTHS = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

// Stage geometry — designed against 1920×1080

function ClimateBands() {

  const fadeIn = clamp(t / 2.0, 0, 1);
  // CTA wash takes over after 42s
  const fadeOut = 1 - clamp((t - 42) / 1.0, 0, 1);

  // Bottom strip animates in cell-by-cell starting at 16s
  const stripIn = clamp((t - 16) / 5.0, 0, 1);

  return (
    <>
      {/* Tonal background bands (subtle) */}
      {BANDS.map((b, i) => (
        <div key={'tone' + i} style={{
          position: 'absolute',
          left: b.x, top: 0,
          width: b.w, height: H - 50,
          background: b.tone,
          opacity: 0.55 * fadeIn * fadeOut,

      {BANDS.slice(1).map((b, i) => (
        <div key={'sep' + i} style={{

          left: b.x, top: 0,

          opacity: 0.06 * fadeIn,

  { color: '#42A5F5', opacity: 0.55, w: 1.4, baseY: 550,  amp: 80,  freq: 1.4, phase: 1.3, label: '⛅ PLUVIOSIDADE', at: 7.0 },
  { color: '#FB8C00', opacity: 0.50, w: 1.4, baseY: 900,  amp: 55,  freq: 1.2, phase: 2.4, label: '☀️ RADIAÇÃO',     at: 8.5 },
  { color: '#FDD835', opacity: 0.45, w: 1.2, baseY: 780,  amp: 40,  freq: 0.8, phase: 0.7, label: '💧 UMIDADE',      at: 10.0 },
];

function ClimateCurves() {
  const t = useTime();
  return (
    <svg
      style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}
      width={W} height={H} viewBox={`0 0 ${W} ${H}`}
    >
      {CURVES.map((c, i) => (
        <CurvePath key={i} c={c} t={t} />
      ))}
    </svg>
  );
}

function CurvePath({ c, t }) {
  if (t < c.at) return null;
  const local = t - c.at;
  const draw = clamp(local / 2.4, 0, 1);
  const eased = Easing.easeOutCubic(draw);
  // Subtle drift while on screen
  const drift = (t - c.at) * 0.15;

  const N = 140;
  const points = [];
  for (let i = 0; i < N; i++) {
    const x = (i / (N - 1)) * W;
    const yShift =
      Math.sin(i * 0.06 * c.freq + c.phase + drift) * c.amp +
      Math.sin(i * 0.18 * c.freq + c.phase * 1.7 + drift * 0.7) * (c.amp * 0.35) +
      Math.cos(i * 0.04 + c.phase + drift * 0.3) * (c.amp * 0.25);
    points.push([x, c.baseY + yShift]);
  }
  const visible = Math.max(2, Math.floor(points.length * eased));
  const path = points.slice(0, visible)
    .map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`)
    .join(' ');

  return (
    <path d={path} fill="none"
      stroke={c.color} strokeWidth={c.w}
      strokeOpacity={c.opacity}
      strokeLinecap="round" strokeLinejoin="round" />
  );
}

  // Slow breathing
  const breath = 1 + 0.04 * Math.sin(t * 0.6);

  const fadeOut = 1 - clamp((t - 42) / 0.8, 0, 1);

  const rings = [
    { r: 80, color: '#1e4a1e', op: 0.30, w: 0.8 },
    { r: 60, color: '#2d6a2d', op: 0.42, w: 0.8 },
    { r: 42, color: '#43A047', op: 0.55, w: 1.0 },
    { r: 24, color: '#66bb6a', op: 0.70, w: 1.2 },

  // Ripple ring expanding outward, repeating
  const ripplePhase = (t * 0.45) % 1;
  const rippleR = 24 + ripplePhase * 100;
  const rippleOp = (1 - ripplePhase) * 0.4;

  return (
    <div style={{
      position: 'absolute', inset: 0,

      pointerEvents: 'none',

      {/* Vase / pot stub */}
      <div style={{

        left: CENTER.x - 12, top: CENTER.y + 50,

        opacity: 0.55,
        transform: `scaleY(${eased})`,

      {/* Concentric rings */}
      <svg
        style={{ position: 'absolute', inset: 0 }}
        width={W} height={H} viewBox={`0 0 ${W} ${H}`}

        {rings.map((r, i) => (
          <circle key={i}

        <circle
          cx={CENTER.x} cy={CENTER.y - 30}
          r={9 * breath * eased}

// ── EVENT CARD — exact format do calendário real ──────────────────────────

// Cascade de semanas: 6 janelas empilhadas (3 atrás, 1 ativa, 2 à frente)
const CASCADE = [
  { weeks: -3, label: 'SEMANA · 1–8 ABR',   tag: '🟡 SEMANA · CHUVA INTENSA',     dateLabel: '📅 1 – 8 Abr · Calendário de Cultivo' },
  { weeks: -2, label: 'SEMANA · 8–15 ABR',  tag: '🟢 SEMANA · TRANSIÇÃO',          dateLabel: '📅 8 – 15 Abr · Calendário de Cultivo' },
  { weeks: -1, label: 'SEMANA · 15–22 ABR', tag: '🟢 SEMANA · TEMPERATURAS AMENAS',dateLabel: '📅 15 – 22 Abr · Calendário de Cultivo' },
  { weeks:  0, label: 'SEMANA · 22–30 ABR', tag: '🟢 SEMANA · TEMPERATURAS AMENAS',dateLabel: '📅 22 – 30 Abr · Calendário de Cultivo', active: true },
  { weeks: +1, label: 'SEMANA · 30–6 MAI',  tag: '🟢 SEMANA · ESTÁVEL',            dateLabel: '📅 30 Abr – 6 Mai · Calendário de Cultivo' },
  { weeks: +2, label: 'SEMANA · 6–13 MAI',  tag: '🟠 SEMANA · DIA DAS MÃES',       dateLabel: '📅 6 – 13 Mai · Calendário de Cultivo' },
];

function EventCard() {
  const t = useTime();
  const start = 30.0;
  if (t < start) return null;
  const local = t - start;

  const fadeOut = 1 - clamp((t - 42) / 0.8, 0, 1);
  if (fadeOut <= 0) return null;

  // Each cascade window enters one after another
  // Active window enters first; back/front windows fan out around it
  const order = [3, 2, 4, 1, 5, 0]; // active, then closest, then far
  const enterTimings = order.map((idx, n) => ({ idx, at: 0 + n * 0.35 }));

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', opacity: fadeOut }}>
      {CASCADE.map((win, i) => {
        const timing = enterTimings.find(x => x.idx === i);
        const startLocal = timing ? timing.at : 0;
        const e = clamp((local - startLocal) / 0.7, 0, 1);
        const eased = Easing.easeOutCubic(e);
        if (eased <= 0) return null;

        // Stack: weeks=-3..0 go behind/up-left, weeks=+1,+2 go front/down-right
        // Active (weeks=0) sits centered and largest
        const w = win.weeks;
        const isActive = w === 0;
        const cardW = 760;
        const cardH = 660;
        const cx = (W - cardW) / 2;
        const cy = 230;

        // Offset/rotation per stack position
        const offsetX = w * 70;       // 0, ±70, ±140, ±210
        const offsetY = -Math.abs(w) * 24 + (w > 0 ? 36 : 0);
        const rot = w * -1.8;         // very subtle fan
        const scale = isActive ? 1.0 : 0.94 - Math.abs(w) * 0.025;
        const blur = isActive ? 0 : Math.min(2 + Math.abs(w) * 1.2, 6);
        const alpha = isActive ? 1 : 0.55 - Math.abs(w) * 0.08;
        const z = isActive ? 100 : (50 - Math.abs(w) * 5);

        return (
          <div key={i} style={{
            position: 'absolute',
            left: cx + offsetX,
            top: cy + offsetY + (1 - eased) * 40,
            width: cardW, height: cardH,
            transform: `rotate(${rot}deg) scale(${scale * eased + (1-eased)*0.85})`,
            transformOrigin: 'center top',
            opacity: eased * alpha,
            filter: blur > 0 ? `blur(${blur}px)` : 'none',
            zIndex: z,
            background: 'rgba(15, 26, 16, 0.94)',
            border: `1px solid ${isActive ? 'rgba(67,160,71,0.55)' : 'rgba(67,160,71,0.25)'}`,
            boxShadow: isActive
              ? '0 30px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(67,160,71,0.15) inset'
              : '0 16px 40px rgba(0,0,0,0.5)',
            backdropFilter: 'blur(8px)',
            WebkitBackdropFilter: 'blur(8px)',
            overflow: 'hidden',
            fontFamily: 'Arial, sans-serif',
            color: '#f7f5f0',
            padding: '24px 32px',
          }}>
            {isActive
              ? <ActiveCardBody local={local} win={win} />
              : <PreviewCardBody win={win} />
            }
          </div>
        );
      })}

      {/* Caption explaining the cascade */}
      <CascadeCaption local={local} />
    </div>
  );
}

// ── Tally — accumulating counter (mantém a ideia de soma) ─────────────────

function Tally() {
  const t = useTime();
  const sigCount = CURVES.filter(c => t >= c.at).length;
  const dotCount = DOTS.filter(d => t >= d.at).length;
  const stripPct = Math.floor(clamp((t - 16) / 5.0, 0, 1) * 100);
  const phenoOn = t >= 22.0 ? 5 : 0;
  const eventOn = t >= 30 ? 1 : 0;
  // Hide tally during phenology+event phase to avoid collision
  const hide = t >= 21.5 && t < 41.5;
  const fadeOut = (1 - clamp((t - 41) / 1.0, 0, 1)) * (hide ? 0 : 1);

  const rows = [
    ['🌡️ sinais',     `${sigCount} / 4`],
    ['📍 marcos',     `${dotCount} / 6`],
    ['📊 ano',        `${stripPct}%`],
    ['🍂 fenologia',  `${phenoOn} / 5`],
    ['📅 evento',     `${eventOn} / 1`],
  ];

  return (
    <div style={{
      position: 'absolute',
      left: 40, bottom: 130,
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 11,
      color: 'rgba(255,255,255,0.85)',
      letterSpacing: '0.04em',
      opacity: fadeOut,
    }}>
      <div style={{
        color: 'rgba(255,255,255,0.4)',
        letterSpacing: '0.14em',
        marginBottom: 8,
      }}>
        ACUMULANDO
      </div>
      {rows.map(([k, v]) => (
        <div key={k} style={{
          display: 'flex',
          justifyContent: 'space-between',
          width: 220,
          padding: '3px 0',
          borderBottom: '1px solid rgba(255,255,255,0.08)',
        }}>
          <span style={{ color: 'rgba(255,255,255,0.5)' }}>{k}</span>
          <span style={{ fontVariantNumeric: 'tabular-nums' }}>{v}</span>
        </div>
      ))}
    </div>
  );
}

// ── CTA Overlay (final) ───────────────────────────────────────────────────

function CTAOverlay() {
  const t = useTime();
  if (t < 42.0) return null;
  const local = t - 42.0;
  const wash = clamp(local / 1.0, 0, 1);
  const easedWash = Easing.easeInOutCubic(wash);

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: '#0d1a0d',
        opacity: easedWash,
      }}/>
      <div style={{
        position: 'absolute',
        left: 0, right: 0, top: '50%',
        height: 6, display: 'flex',
        opacity: clamp((local - 0.6) / 0.5, 0, 1),
      }}>
        {PALETTE.map((c, i) => (
          <div key={i} style={{ flex: 1, background: c }}/>
        ))}
      </div>
      {local > 1.0 && <CTAText local={local - 1.0} />}
    </div>
  );
}

function CTAText({ local }) {
  const lines = [

            color: '#9bbfa0', fontSize: 14, letterSpacing: '0.1em',
          }}>
            A PARTIR DE
            <div style={{

            }}>
              R$ 19,90<span style={{ fontSize: 22, color: '#9bbfa0', marginLeft: 8 }}>/ mês</span>
            </div>
          </div>
          <div style={{
            textAlign: 'right',
            fontFamily: 'JetBrains Mono, ui-monospace, monospace',
          }}>
            <div style={{
              fontSize: 13, color: '#9bbfa0',
              letterSpacing: '0.12em', marginBottom: 8,
            }}>
              📅 ASSINE EM
            </div>
            <div style={{
              fontSize: 32, color: '#f7f5f0',
              borderBottom: '2px solid #FDD835',
              paddingBottom: 4, display: 'inline-block',
            }}>
              cultivoornamental.com.br
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
